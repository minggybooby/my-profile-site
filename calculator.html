<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            background: #222;
            color: #fff;
            font-size: 2.5em;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            margin-bottom: 20px;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 60px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .number-btn {
            background: #f0f0f0;
            color: #333;
        }

        .number-btn:hover {
            background: #e0e0e0;
        }

        .operator-btn {
            background: #667eea;
            color: white;
        }

        .operator-btn:hover {
            background: #5568d3;
        }

        .equals-btn {
            background: #48bb78;
            color: white;
            grid-column: span 2;
        }

        .equals-btn:hover {
            background: #38a169;
        }

        .clear-btn {
            background: #f56565;
            color: white;
            grid-column: span 2;
        }

        .clear-btn:hover {
            background: #e53e3e;
        }

        .delete-btn {
            background: #ed8936;
            color: white;
        }

        .delete-btn:hover {
            background: #dd6b20;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear-btn" onclick="clearDisplay()">AC</button>
            <button class="delete-btn" onclick="deleteLast()">DEL</button>
            <button class="operator-btn" onclick="setOperator('/')">/</button>
            <button class="operator-btn" onclick="setOperator('*')">×</button>

            <button class="number-btn" onclick="appendNumber('7')">7</button>
            <button class="number-btn" onclick="appendNumber('8')">8</button>
            <button class="number-btn" onclick="appendNumber('9')">9</button>
            <button class="operator-btn" onclick="setOperator('-')">−</button>

            <button class="number-btn" onclick="appendNumber('4')">4</button>
            <button class="number-btn" onclick="appendNumber('5')">5</button>
            <button class="number-btn" onclick="appendNumber('6')">6</button>
            <button class="operator-btn" onclick="setOperator('+')">+</button>

            <button class="number-btn" onclick="appendNumber('1')">1</button>
            <button class="number-btn" onclick="appendNumber('2')">2</button>
            <button class="number-btn" onclick="appendNumber('3')">3</button>
            <button class="number-btn" onclick="appendNumber('.')">.</button>

            <button class="number-btn" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
            <button class="equals-btn" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentValue = '0';
        let previousValue = '';
        let operator = null;
        let shouldResetDisplay = false;

        function updateDisplay() {
            display.textContent = currentValue;
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentValue = num;
                shouldResetDisplay = false;
            } else {
                if (currentValue === '0' && num !== '.') {
                    currentValue = num;
                } else if (num === '.' && currentValue.includes('.')) {
                    return;
                } else {
                    currentValue += num;
                }
            }
            updateDisplay();
        }

        function setOperator(op) {
            if (operator !== null && !shouldResetDisplay) {
                calculate();
            }
            previousValue = currentValue;
            operator = op;
            shouldResetDisplay = true;
        }

        function calculate() {
            // TODO(human): 실제 계산 로직 구현
            // previousValue와 currentValue, operator를 사용하여 결과를 계산하세요.
            // 예: previousValue가 '5', operator가 '+', currentValue가 '3'이면 결과는 '8'
            // 마지막에 currentValue를 계산 결과로 업데이트하고, updateDisplay()를 호출하세요.
            

            shouldResetDisplay = true;
            operator = null;
        }

        function clearDisplay() {
            currentValue = '0';
            previousValue = '';
            operator = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
